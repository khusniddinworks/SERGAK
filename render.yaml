services:
  - type: web
    name: sergak-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: BOT_TOKEN
        sync: false
        description: "Telegram BotFather'dan olingan token"
      - key: ADMIN_ID
        sync: false
        description: "Sizning Telegram ID (raqamda)"
      - key: BOT_USERNAME
        sync: false
        description: "Bot username (@ belgisiz, masalan: sergakaibot)"
      - key: SECRET_KEY
        sync: false
        description: "Maxfiy HMAC-SHA256 kaliti (kamida 32 ta belgi)"
      - key: WEBSITE_PATH
        value: ".."
        description: "Website papkasi yo'li (.. bot joylashgan joyning tepasi)"
      - key: APK_PATH
        value: "../../ai_ximoyachi/build/app/outputs/flutter-apk/app-release.apk"
        description: "Android APK fayli yo'li"

